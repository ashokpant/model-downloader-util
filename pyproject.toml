[project]
name = "modeldownloaderutil"
version = "1.0.0"
description = "Unified model downloader util from s3, google bucket, minio, rustfs, git lfs, local path, and url."
authors = [{ name = "Ashok Pant", email = "ashok@treeleaf.ai" }]
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["model", "download", "s3", "google bucket", "rustfs", "minio", "git lfs"]
dependencies = [
    "appdirs>=1.4.4",
    "requests>=2.34.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["modeldownloaderutil"]

[tool.uv]
package = true

[tool.ruff]
line-length = 160
target-version = "py313"
exclude = [
    ".git", ".idea", ".eggs", "examples", "docs",
    ".tox", "bin", "dist", "tools", "*.egg-info", "__init__.py", "*.yml",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]


